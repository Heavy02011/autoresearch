name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

env:
  PYTHONPATH: src

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.3.6

      - name: Set up Python 3.10
        uses: actions/setup-python@v5.5.0
        with:
          python-version: "3.10"

      - name: Install linting tools
        run: pip install ruff pyright

      - name: Ruff lint
        run: ruff check src/ tests/ --select E,W,F --ignore E501

      - name: Ruff format check
        run: ruff format --check src/ tests/

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4.3.6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5.5.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install core dependencies (CPU-only, no GPU required)
        run: |
          pip install --upgrade pip
          pip install \
            pydantic==2.* \
            typer \
            structlog \
            omegaconf \
            pytest \
            pytest-cov \
            torch==2.2.2 --index-url https://download.pytorch.org/whl/cpu

      - name: Install package in editable mode
        run: pip install -e . --no-deps

      - name: Run unit tests
        run: |
          pytest tests/test_units.py tests/test_state_machine.py -v --tb=short

      - name: Run integration tests (dry-run mode, no simulator)
        run: |
          pytest tests/test_integration.py tests/test_e2e.py -v --tb=short \
            -k "not simulator and not gpu"

      - name: Upload coverage report
        if: matrix.python-version == '3.10'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  dry-run-validation:
    name: Dry-Run Pipeline Validation
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            pydantic==2.* \
            typer \
            structlog \
            omegaconf \
            torch==2.2.2 --index-url https://download.pytorch.org/whl/cpu
          pip install -e . --no-deps

      - name: Validate CLI entrypoint
        run: autoresearch --help

      - name: Run preflight check
        run: autoresearch preflight || true   # warns only; no simulator in CI

      - name: Run 2-iteration dry-run
        run: |
          autoresearch run \
            --dry-run \
            --max-iterations 2 \
            --run-id ci-validation-${{ github.run_number }}

      - name: Verify run artifacts exist
        run: |
          RUN_DIR="runs/ci-validation-${{ github.run_number }}"
          test -d "$RUN_DIR" && echo "Run directory created: $RUN_DIR"
          ls -la "$RUN_DIR/"

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (no GPU runtime needed for build check)
        run: docker build -f docker/Dockerfile -t autoresearch:ci-${{ github.run_number }} .

      - name: Smoke test container
        run: |
          docker run --rm \
            -e AUTORESEARCH_RUNS_DIR=/tmp/runs \
            autoresearch:ci-${{ github.run_number }} \
            preflight || true
